services:
  # You'd do something similar to this in CI/CD pipeline to apply your migrations and seed your database before your app starts (does not matter if it is QA, prod, or dev env).
  init-postgres: &init-postgres
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    profiles:
      - dev
      - backend-e2e
      - frontend-e2e
    env_file:
      - .env
    command:
      [
        "/bin/sh",
        "-lc",
        "npx nx run backend:prisma:db:push && npx nx prisma:generate backend && npx nx run backend:prisma:seed",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps
      - ./apps/backend/data:/data
      - /app/node_modules

  backend: &backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
      args:
        PORT: $PORT
    profiles:
      - dev
    ports:
      - "3000:$PORT"
    env_file:
      - .env
    volumes:
      - ./apps:/app/apps
      - ./apps/backend/data:/data
      - /app/node_modules
    depends_on:
      init-postgres:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      s3:
        condition: service_healthy
      init-s3:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      tts:
        condition: service_healthy
      zitadel:
        condition: service_started
      cerbos:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-H",
          "Content-Type: application/json",
          "--data",
          '{"query":"{ health }"}',
          "http://localhost:$PORT/graphql",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
      args:
        FRONTEND_PORT: $FRONTEND_PORT
        VITE_SERVICE_URL: $VITE_SERVICE_URL
    profiles:
      - dev
    ports:
      - "4200:$FRONTEND_PORT"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      s3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:$FRONTEND_PORT"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-e2e:
    <<: *backend
    profiles:
      - backend-e2e
      - frontend-e2e
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
      args:
        PORT: $PORT
        DATABASE_URL: ${DATABASE_URL}
    volumes: []

  frontend-e2e:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
      args:
        VITE_SERVICE_URL: http://localhost:$PORT
    profiles:
      - frontend-e2e
    depends_on:
      backend-e2e:
        condition: service_healthy
      s3:
        condition: service_healthy
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:18.2-bookworm
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  init-zitadel-db:
    image: postgres:18.2-bookworm
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until pg_isready -h postgres -U $$PGUSER; do sleep 1; done
        psql -h postgres -U $$PGUSER -tc "SELECT 1 FROM pg_roles WHERE rolname='zitadel'" | grep -q 1 \
          || psql -h postgres -U $$PGUSER -c "CREATE ROLE zitadel LOGIN PASSWORD 'zitadel';"
        psql -h postgres -U $$PGUSER -tc "SELECT 1 FROM pg_database WHERE datname='zitadel'" | grep -q 1 \
          || psql -h postgres -U $$PGUSER -c "CREATE DATABASE zitadel OWNER zitadel;"
        echo "ZITADEL database ready!"
    depends_on:
      postgres:
        condition: service_healthy

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.2
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNAL_PORT}
      ZITADEL_EXTERNALDOMAIN: zitadel
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-Admin123!}
      # Allow internal Docker-network origins so backend can reach OIDC endpoints
      ZITADEL_DEFAULTINSTANCE_INSTANCENAME: ZITADEL
      ZITADEL_DEFAULTINSTANCE_ORIGINS: http://localhost:${ZITADEL_EXTERNAL_PORT} http://zitadel:8080
    ports:
      - "${ZITADEL_EXTERNAL_PORT}:8080"
    depends_on:
      init-zitadel-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    ports:
      - "${CERBOS_HTTP_PORT:-3592}:3592"
      - "${CERBOS_GRPC_PORT:-3593}:3593"
    volumes:
      - ./local-setup/cerbos:/config
    command: server --config=/config/.cerbos.yaml
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8.4
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - ${PGADMIN_EXPOSED_PORT}:80
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
      - source: preferences.json
        target: /pgadmin4/preferences.json

  redis:
    image: redis:8.6-alpine3.23
    restart: always
    command: >
      sh -c "redis-server
      --maxmemory $${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy $${REDIS_MAXMEMORY_POLICY:-allkeys-lfu}
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - ./.env
    deploy:
      resources:
        limits:
          memory: 640M
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
          redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG;
        else
          redis-cli ping | grep PONG;
        fi'
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RI_APP_PORT: 5540
      RI_LOG_LEVEL: debug
      RI_ACCEPT_TERMS_AND_CONDITIONS: true
      # 👇 Does NOT create a DB connection most of the times, create it manually.
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: "Local Redis (compose)"
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node",
          "--experimental-default-type=module",
          '-e "console.log((await fetch(''http://localhost:5540/api/health/'')).ok === true && ''healthy'')"',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    build:
      context: local-setup/ollama
      dockerfile: Dockerfile
      args:
        # Change this 👇 if you want a different model baked in
        OLLAMA_MODEL: llama3.2:1b
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  # Takes up to 1 minute to start!
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8090:8080"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=$OLLAMA_BASE_URL
      - WEBUI_AUTH=False
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tts:
    image: 9109679196/piper-tts-rest-api:2.1.0
    user: "1000:1000"
    environment:
      PIPER_MODEL: /app/models/en_US-lessac-medium.onnx
      PORT: 3000
      LOGGING_MODE: "JSON"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  s3:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z-cpuv1
    ports:
      - "9000:9000"
      - "9001:9001" # Dashboard
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 3

  init-s3:
    image: minio/mc
    depends_on:
      s3:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    volumes:
      - ./apps/backend/data:/source-data
      - ./local-setup/bucket-policy.json:/bucket-policy.json:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        /usr/bin/mc alias set my_minio http://s3:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        /usr/bin/mc admin info my_minio
        /usr/bin/mc mb my_minio/smart-novel || true
        for file in /source-data/**/*.png /source-data/**/**/*.png; do
          [ -f "$$file" ] && /usr/bin/mc cp "$$file" my_minio/smart-novel/covers/
        done
        /usr/bin/mc anonymous set-json /bucket-policy.json my_minio/smart-novel
        echo 'MinIO initialization complete!'

configs:
  preferences.json:
    content: |
      {
        "preferences": {
          "misc:themes:theme": "dark",
          "browser:display:show_system_objects": true,
          "browser:display:confirm_on_refresh_close": false,
          "browser:display:show_user_defined_templates": true
        }
      }
  servers.json:
    content: |
      {
        "Servers": {
          "1": {
            "Group": "Servers",
            "Name": "Smart Novel Database",
            "Host": "postgres",
            "Port": 5432,
            "MaintenanceDB": "${POSTGRES_DB}",
            "Username": "${POSTGRES_USER}",
            "SSLMode": "prefer",
            "BGColor": "#FF4500",
            "FGColor": "#222222",
            "Comment": "This server will connect to the instance we've created in our compose file."
          }
        }
      }
